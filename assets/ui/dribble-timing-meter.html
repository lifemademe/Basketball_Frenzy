<div class="dribble-timing" data-dribble-timing data-active="false" data-ready="false" data-perfect="false" role="meter" aria-label="Center switch timing" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0" aria-valuetext="Scanning for a center target">
  <div class="dribble-timing-header">
    <span>{{label}}</span>
    <strong data-timing-state>{{state}}</strong>
  </div>
  <div class="dribble-timing-track">
    <div class="dribble-timing-perfect"></div>
    <div class="dribble-timing-center-line"></div>
    <div class="dribble-timing-marker"><i></i></div>
  </div>
</div>
