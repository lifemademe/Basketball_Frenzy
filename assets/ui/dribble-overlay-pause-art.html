<div class="dribble-overlay" data-dribble-overlay data-mode="pause">
  <div class="dribble-overlay-backdrop"></div>
  <section class="dribble-overlay-panel">
    <button class="dribble-overlay-close" data-overlay-close type="button" aria-label="Resume game">
      <img src="@project/assets/textures/close.png" alt="">
    </button>
    <div class="dribble-overlay-accent"></div>
    <h1 class="dribble-overlay-title" data-overlay-title>{{title}}</h1>
    <p class="dribble-overlay-subtitle" data-overlay-subtitle>{{subtitle}}</p>
    <div class="dribble-overlay-score">
      <span data-overlay-score-label>{{scoreLabel}}</span>
      <strong data-overlay-score>{{score}}</strong>
    </div>
    <div class="dribble-overlay-actions">
      <div class="dribble-overlay-action" data-overlay-resume-slot></div>
      <div class="dribble-overlay-action" data-overlay-restart-slot></div>
      <div class="dribble-overlay-action dribble-overlay-main-menu" data-overlay-main-menu-slot>
        <img src="@project/assets/textures/menu_button.png" alt="">
      </div>
    </div>
  </section>
</div>
