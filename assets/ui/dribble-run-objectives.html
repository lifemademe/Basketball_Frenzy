<section class="dribble-run-objectives" data-run-objectives aria-label="Run objectives">

    <div class="dribble-normal-run-timer-copy">
      <span data-run-timer-label>TIME LEFT</span>
      <strong data-run-timer-value>2:00</strong>

  <div class="dribble-run-objectives-title" data-objectives-title>RUN OBJECTIVES</div>
  <ol class="dribble-run-objectives-list" data-objectives-list></ol>
</section>
