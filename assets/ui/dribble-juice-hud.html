<div class="dribble-juice-hud" data-dribble-juice>
  <div class="dribble-frenzy-screen" data-frenzy-screen aria-hidden="true">
    <i class="dribble-frenzy-streak"></i>
    <i class="dribble-frenzy-streak"></i>
    <i class="dribble-frenzy-streak"></i>
    <i class="dribble-frenzy-streak"></i>
    <i class="dribble-frenzy-streak"></i>
    <i class="dribble-frenzy-streak"></i>
    <i class="dribble-frenzy-streak"></i>
    <i class="dribble-frenzy-streak"></i>
  </div>
  <section class="dribble-frenzy-meter" data-frenzy-meter data-active="false" data-urgent="false" role="progressbar" aria-label="Frenzy time remaining" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0">
    <div class="dribble-frenzy-track">
      <div class="dribble-frenzy-fill"><i aria-hidden="true"></i></div>
      <div class="dribble-frenzy-core"><i aria-hidden="true"></i></div>
    </div>
  </section>
  <div class="dribble-frenzy-intro" aria-hidden="true">
    <span style="--frenzy-letter: 0">F</span>
    <span style="--frenzy-letter: 1">R</span>
    <span style="--frenzy-letter: 2">E</span>
    <span style="--frenzy-letter: 3">N</span>
    <span style="--frenzy-letter: 4">Z</span>
    <span style="--frenzy-letter: 5">Y</span>
  </div>
  <div class="dribble-score-praise" data-score-praise data-tone="green"></div>
  <section class="dribble-coach" data-dribble-coach data-active="false" aria-live="polite">
    <strong data-dribble-coach-title></strong>
    <span data-dribble-coach-body></span>
  </section>
</div>
